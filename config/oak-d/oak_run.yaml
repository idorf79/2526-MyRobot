/oak: 
  ros__parameters: 
    oak: 
      i_tf_camera_model: 'OAK-D-LITE' 
      i_tf_camera_name: 'oak' 
      i_tf_parent_frame: 'oak-d-base-frame' 
      i_enable_ir: false 
      i_nn_type: none
    pipeline_gen: 
      i_enable_imu: false
      i_pipeline_type: 'RGBStereo' 
      i_enable_rgbd: false
    left: 
      i_resolution: 400P 
    right: 
      i_resolution: 400P 
    stereo: 
      i_width: 640 
      i_height: 400 
      i_subpixel: false 
      i_lr_check: false 
      i_publish_topic: true 
      i_align_depth: true 
      i_output_disparity: false 
      i_output_depth: true 
      i_depth_preset: HIGH_ACCURACY 
    rgb: 
      i_disable_node: false
      i_simulate_from_topic: true
      i_width: 640
      i_height: 400


 
